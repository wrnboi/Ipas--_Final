<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI × 碳管理 刷題庫</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.15);
    --text: #e8eaf0;
    --muted: #7b82a0;
    --accent: #6c63ff;
    --accent-light: #8b84ff;
    --green: #22c55e;
    --green-bg: rgba(34,197,94,0.12);
    --red: #ef4444;
    --red-bg: rgba(239,68,68,0.12);
    --yellow: #f59e0b;
    --tag-ai: #6c63ff;
    --tag-carbon: #f59e0b;
    --tag-prompt: #22c55e;
    --tag-data: #06b6d4;
    --tag-iso: #f97316;
    --tag-tcfd: #ec4899;
  }

  body {
    font-family: -apple-system, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    padding: 1.5rem 2rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface);
  }
  .logo { font-size: 1.1rem; font-weight: 700; letter-spacing: -0.02em; }
  .logo span { color: var(--accent-light); }
  .header-stats { display: flex; gap: 1.5rem; }
  .hstat { text-align: right; }
  .hstat-val { font-size: 1.4rem; font-weight: 700; }
  .hstat-label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }

  /* ── Main layout ── */
  .app { display: flex; flex: 1; }

  /* ── Sidebar ── */
  aside {
    width: 260px;
    min-width: 260px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 1.25rem 0;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 0;
  }
  .sidebar-section { padding: 0.4rem 1.25rem 0.2rem; font-size: 0.65rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; margin-top: 0.75rem; }
  .sidebar-btn {
    display: flex; align-items: center; gap: 0.6rem;
    padding: 0.55rem 1.25rem;
    cursor: pointer; font-size: 0.82rem; color: var(--muted);
    border: none; background: none; width: 100%; text-align: left;
    transition: all 0.15s;
    position: relative;
  }
  .sidebar-btn:hover { background: var(--surface2); color: var(--text); }
  .sidebar-btn.active { background: var(--surface2); color: var(--text); }
  .sidebar-btn.active::before {
    content: ''; position: absolute; left: 0; top: 4px; bottom: 4px;
    width: 3px; background: var(--accent); border-radius: 0 2px 2px 0;
  }
  .sb-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .sb-count { margin-left: auto; font-size: 0.72rem; background: var(--surface2); padding: 1px 7px; border-radius: 10px; }
  .sidebar-btn.active .sb-count { background: var(--accent); color: white; }

  .filter-row { padding: 0.75rem 1.25rem; display: flex; flex-direction: column; gap: 0.5rem; border-bottom: 1px solid var(--border); }
  .filter-row label { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; }
  .filter-row select {
    background: var(--surface2); border: 1px solid var(--border2); color: var(--text);
    padding: 0.4rem 0.6rem; border-radius: 6px; font-size: 0.82rem; width: 100%;
  }
  .shuffle-btn {
    margin: 0.75rem 1.25rem 0;
    padding: 0.55rem; border-radius: 8px;
    background: var(--accent); color: white; border: none;
    font-size: 0.82rem; font-weight: 600; cursor: pointer; letter-spacing: 0.02em;
    transition: opacity 0.15s;
  }
  .shuffle-btn:hover { opacity: 0.85; }

  /* ── Content ── */
  main { flex: 1; padding: 2rem; max-width: 760px; overflow-y: auto; }

  /* ── Question card ── */
  .q-header { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1.5rem; }
  .q-num { font-size: 0.75rem; color: var(--muted); font-weight: 600; }
  .q-tag {
    font-size: 0.65rem; padding: 2px 10px; border-radius: 20px;
    font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em;
  }
  .q-progress { margin-left: auto; font-size: 0.75rem; color: var(--muted); }

  .q-text {
    font-size: 1.15rem; font-weight: 500; line-height: 1.6;
    margin-bottom: 2rem; color: var(--text);
  }

  .options { display: flex; flex-direction: column; gap: 0.75rem; margin-bottom: 2rem; }
  .option-btn {
    display: flex; align-items: center; gap: 1rem;
    padding: 0.9rem 1.25rem; border-radius: 10px;
    border: 1px solid var(--border2); background: var(--surface);
    color: var(--text); cursor: pointer; font-size: 0.92rem;
    text-align: left; transition: all 0.15s; width: 100%;
  }
  .option-btn:hover:not(:disabled) { border-color: var(--accent); background: var(--surface2); }
  .option-letter {
    width: 28px; height: 28px; border-radius: 6px; background: var(--surface2);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.75rem; font-weight: 700; flex-shrink: 0; color: var(--muted);
    transition: all 0.15s;
  }
  .option-btn.correct { border-color: var(--green); background: var(--green-bg); }
  .option-btn.correct .option-letter { background: var(--green); color: white; }
  .option-btn.wrong { border-color: var(--red); background: var(--red-bg); }
  .option-btn.wrong .option-letter { background: var(--red); color: white; }
  .option-btn.reveal { border-color: var(--border2); opacity: 0.5; }
  .option-btn:disabled { cursor: default; }

  .feedback {
    padding: 1rem 1.25rem; border-radius: 10px;
    font-size: 0.9rem; line-height: 1.6; margin-bottom: 1.5rem; display: none;
  }
  .feedback.correct { background: var(--green-bg); border: 1px solid rgba(34,197,94,0.3); color: #86efac; }
  .feedback.wrong { background: var(--red-bg); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; }
  .feedback-title { font-weight: 700; margin-bottom: 0.25rem; }

  .nav-row { display: flex; gap: 0.75rem; align-items: center; }
  .nav-btn {
    padding: 0.6rem 1.5rem; border-radius: 8px; font-size: 0.85rem; font-weight: 600;
    cursor: pointer; transition: all 0.15s; border: 1px solid var(--border2);
    background: var(--surface); color: var(--text);
  }
  .nav-btn:hover { background: var(--surface2); }
  .nav-btn.primary { background: var(--accent); border-color: var(--accent); color: white; }
  .nav-btn.primary:hover { opacity: 0.85; }
  .nav-btn:disabled { opacity: 0.4; cursor: default; }
  .skip-btn { margin-left: auto; font-size: 0.8rem; color: var(--muted); cursor: pointer; background: none; border: none; }
  .skip-btn:hover { color: var(--text); }

  /* ── Result screen ── */
  .result-screen {
    display: none; flex-direction: column; align-items: center;
    justify-content: center; min-height: 60vh; gap: 2rem; text-align: center;
  }
  .result-circle {
    width: 120px; height: 120px; border-radius: 50%;
    border: 4px solid var(--accent); display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }
  .result-score { font-size: 2.5rem; font-weight: 800; }
  .result-label { font-size: 0.75rem; color: var(--muted); }
  .result-title { font-size: 1.6rem; font-weight: 700; }
  .result-sub { color: var(--muted); font-size: 0.9rem; }

  /* ── Progress bar ── */
  .progress-bar-wrap { height: 3px; background: var(--border); margin-bottom: 2rem; border-radius: 2px; }
  .progress-bar { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s; }

  /* ── Tags colors ── */
  .tag-ai { background: rgba(108,99,255,0.2); color: #a5a0ff; }
  .tag-carbon { background: rgba(245,158,11,0.2); color: #fcd34d; }
  .tag-prompt { background: rgba(34,197,94,0.2); color: #86efac; }
  .tag-data { background: rgba(6,182,212,0.2); color: #67e8f9; }
  .tag-iso { background: rgba(249,115,22,0.2); color: #fdba74; }
  .tag-tcfd { background: rgba(236,72,153,0.2); color: #f9a8d4; }

  /* ── Mobile ── */
  @media (max-width: 700px) {
    aside { display: none; }
    main { padding: 1.25rem; }
    .q-text { font-size: 1rem; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">AI × 碳管理 <span>刷題庫</span></div>
  <div class="header-stats">
    <div class="hstat">
      <div class="hstat-val" id="stat-correct">0</div>
      <div class="hstat-label">答對</div>
    </div>
    <div class="hstat">
      <div class="hstat-val" id="stat-streak">0</div>
      <div class="hstat-label">連勝</div>
    </div>
    <div class="hstat">
      <div class="hstat-val" id="stat-total">0</div>
      <div class="hstat-label">已答</div>
    </div>
  </div>
</header>

<div class="app">
  <aside>
    <div class="filter-row">
      <label>出題模式</label>
      <select id="mode-select">
        <option value="all">全部題目</option>
        <option value="wrong">只刷錯題</option>
        <option value="unseen">只刷未見題</option>
      </select>
    </div>
    <button class="shuffle-btn" onclick="startQuiz()">🔀 重新出題</button>

    <div class="sidebar-section">分類</div>
    <button class="sidebar-btn active" data-cat="all" onclick="filterCat('all')">
      <span class="sb-dot" style="background:#6c63ff"></span> 全部題目
      <span class="sb-count" id="cnt-all">50</span>
    </button>
    <button class="sidebar-btn" data-cat="ai" onclick="filterCat('ai')">
      <span class="sb-dot" style="background:#a5a0ff"></span> AI 概念
      <span class="sb-count" id="cnt-ai"></span>
    </button>
    <button class="sidebar-btn" data-cat="prompt" onclick="filterCat('prompt')">
      <span class="sb-dot" style="background:#86efac"></span> Prompt Engineering
      <span class="sb-count" id="cnt-prompt"></span>
    </button>
    <button class="sidebar-btn" data-cat="data" onclick="filterCat('data')">
      <span class="sb-dot" style="background:#67e8f9"></span> 資料與 AI 技術
      <span class="sb-count" id="cnt-data"></span>
    </button>
    <button class="sidebar-btn" data-cat="carbon" onclick="filterCat('carbon')">
      <span class="sb-dot" style="background:#fcd34d"></span> 碳盤查與碳排放
      <span class="sb-count" id="cnt-carbon"></span>
    </button>
    <button class="sidebar-btn" data-cat="tcfd" onclick="filterCat('tcfd')">
      <span class="sb-dot" style="background:#f9a8d4"></span> TCFD / CBAM
      <span class="sb-count" id="cnt-tcfd"></span>
    </button>
    <button class="sidebar-btn" data-cat="iso" onclick="filterCat('iso')">
      <span class="sb-dot" style="background:#fdba74"></span> ISO 盤查 / 查驗
      <span class="sb-count" id="cnt-iso"></span>
    </button>
  </aside>

  <main>
    <div id="quiz-screen">
      <div class="progress-bar-wrap"><div class="progress-bar" id="progress-bar"></div></div>
      <div class="q-header">
        <span class="q-num" id="q-num">題目 1</span>
        <span class="q-tag" id="q-tag"></span>
        <span class="q-progress" id="q-progress"></span>
      </div>
      <div class="q-text" id="q-text"></div>
      <div class="options" id="options"></div>
      <div class="feedback" id="feedback">
        <div class="feedback-title" id="fb-title"></div>
        <div id="fb-body"></div>
      </div>
      <div class="nav-row">
        <button class="nav-btn" id="prev-btn" onclick="goPrev()">← 上一題</button>
        <button class="nav-btn primary" id="next-btn" onclick="goNext()" style="display:none">下一題 →</button>
        <button class="skip-btn" id="skip-btn" onclick="skipQ()">跳過</button>
      </div>
    </div>

    <div class="result-screen" id="result-screen">
      <div class="result-circle">
        <div class="result-score" id="res-score"></div>
        <div class="result-label">分數</div>
      </div>
      <div>
        <div class="result-title" id="res-title"></div>
        <div class="result-sub" id="res-sub"></div>
      </div>
      <div style="display:flex;gap:0.75rem">
        <button class="nav-btn primary" onclick="startQuiz()">再來一輪 🔀</button>
        <button class="nav-btn" onclick="reviewWrong()">複習錯題</button>
      </div>
    </div>
  </main>
</div>

<script>
const ALL_QUESTIONS = [
  // AI 概念
  { id:1, cat:'ai', q:'AI 技術中，哪一種模型像是一個「生成器」，能夠無中生有地寫文章或畫圖？',
    opts:['鑑別式 AI','生成式 AI (Generative AI)','傳統資料庫','隨身碟'], ans:1,
    explain:'生成式 AI 能夠從學習到的資料中「創造」新內容，例如 ChatGPT 寫文章、Midjourney 畫圖。' },
  { id:2, cat:'ai', q:'當大語言模型 (LLM) 不懂裝懂，自己編造出看似合理但其實是假的資訊時，這種現象叫什麼？',
    opts:['系統更新','機器學習','幻覺 (Hallucination)','雲端備份'], ans:2,
    explain:'Hallucination（幻覺）是指 AI 以高度自信的語氣說出錯誤或捏造的資訊，這是 LLM 目前的主要風險之一。' },
  { id:3, cat:'ai', q:'為了防止 AI 胡說八道，企業會把真實的法規檔案餵給 AI 讓它「先搜尋再回答」，這套技術簡稱什麼？',
    opts:['RAG (檢索增強生成)','GPS (全球定位)','USB (通用序列匯流排)','PDF (可攜式文件)'], ans:0,
    explain:'RAG（Retrieval-Augmented Generation）讓 AI 先從企業自有知識庫搜尋相關段落，再根據這些段落生成回答，大幅降低幻覺。' },
  { id:4, cat:'ai', q:'AI 有時候會為了討好人類而給出錯誤承諾，因此企業對外發布重要文件時，最後一關一定要由誰來把關？',
    opts:['另一個 AI','人類 (Human-in-the-loop)','外星人','電腦病毒'], ans:1,
    explain:'Human-in-the-loop（人類在迴路中）是 Responsible AI 的核心原則——最終決策與審查必須由人類負責。' },
  { id:5, cat:'ai', q:'用 AI 幫忙做決策時，除了考慮幫公司賺錢，也要考慮會不會害員工失業或危害社區，這稱為什麼概念？',
    opts:['負責任 AI (Responsible AI)','賺錢機器','傳統統計學','虛擬實境'], ans:0,
    explain:'Responsible AI 要求 AI 的設計和應用必須考量公平性、透明度、安全性，以及對社會的整體影響。' },
  { id:6, cat:'ai', q:'現代的 AI 不只會讀文字，還能同時看圖、聽聲音，這種超強的 AI 統稱為什麼？',
    opts:['單一 AI','傳統 AI','多模態 AI (Multimodal AI)','計算機'], ans:2,
    explain:'多模態 AI 能同時處理文字、圖像、聲音、影片等多種輸入格式，例如 GPT-4V 可以看圖回答問題。' },
  { id:7, cat:'ai', q:'面對每年都在變的氣候法規，我們為什麼推薦用 RAG 架構，而不是重新微調 (Fine-tuning) AI 模型？',
    opts:['因為 RAG 名字比較好聽','因為 RAG 只要上傳新 PDF 就能馬上更新知識，成本低又快','因為 RAG 不用插電','因為微調不用錢'], ans:1,
    explain:'Fine-tuning 需要重新訓練模型，成本高且耗時。RAG 只需更新知識庫文件，幾乎即時生效，非常適合法規頻繁更動的場景。' },
  { id:8, cat:'ai', q:'在 AI 領域，區分一張照片是「貓」還是「狗」，或者區分一筆帳單是「範疇一」還是「範疇二」，這是哪種 AI 最擅長的事？',
    opts:['鑑別式 AI','音響','螢幕','滑鼠'], ans:0,
    explain:'鑑別式 AI（Discriminative AI）專門用於分類和判斷，例如影像分類、文字分類、情感分析等任務。' },
  { id:9, cat:'ai', q:'使用 NotebookLM 時，系統在回答的文字後面會附上「[1], [2]」的小標籤，點擊可以連回原始 PDF 檔，這叫什麼功能？',
    opts:['遊戲代碼','引用標籤 (Citations)','亂數表','網址列'], ans:1,
    explain:'Citations（引用標籤）讓使用者可以追蹤 AI 的資訊來源，提高可信度並方便驗證。' },
  { id:10, cat:'ai', q:'上完這門實戰營，現代「綠領人才」最核心的競爭力是什麼？',
    opts:['把所有法規條文一字不漏地死背下來','拒絕使用電腦','學會利用 AI 工具處理資料，並用人類的智慧去監管 AI 的結果','每天加班算數學'], ans:2,
    explain:'綠領人才需要具備 AI 工具素養，但更重要的是保有人類的判斷力，能夠發現並修正 AI 的錯誤。' },

  // Prompt Engineering
  { id:11, cat:'prompt', q:'在提示工程 (Prompt Engineering) 中，我們常會叫 AI「請扮演一位有 10 年經驗的法規遵循長」，這屬於 CTF 框架中的哪一個步驟？',
    opts:['T (任務)','C/R (上下文或角色設定)','F (格式)','S (儲存)'], ans:1,
    explain:'CTF 框架中，C/R 代表 Context/Role（上下文/角色），給 AI 設定一個專業身分，能讓回答更精準、符合該領域語氣。' },
  { id:12, cat:'prompt', q:'要求 AI 在給出答案前，必須「一步步寫出推理的過程」，這項超好用的提示技巧叫什麼？',
    opts:['少樣本提示 (Few-shot)','思維鏈 (CoT)','資料去重 (Deduplication)','影像辨識 (CV)'], ans:1,
    explain:'Chain-of-Thought（思維鏈）要求 AI 顯示推理過程，能大幅提升複雜問題的準確率，原理是強迫模型「想清楚再說」。' },
  { id:13, cat:'prompt', q:'比思維鏈 (CoT) 更厲害，讓 AI 在腦中像畫樹枝一樣「思考多條不同的路線再做決定」，這叫什麼提示法？',
    opts:['思想樹 (Tree of Thoughts / ToT)','隨機亂清','蘋果樹','記憶體清理'], ans:0,
    explain:'Tree of Thoughts（思想樹）讓 AI 同時探索多條推理路徑，對需要規劃或多步驟邏輯的問題效果特別好。' },
  { id:14, cat:'prompt', q:'告訴 AI 任務時，先給它 1 到 2 個「正確的範例」讓它照著學，這叫什麼提示技巧？',
    opts:['黑它一頓','少樣本提示 (Few-shot Prompting)','不給提示 (Zero-shot)','重新開機'], ans:1,
    explain:'Few-shot Prompting 提供少量示例，讓 AI 理解任務格式與期望輸出，比純文字描述更有效。' },
  { id:15, cat:'prompt', q:'在提示 AI 時，特別告訴它「要用董事會的專業語氣」，這種給予特定方向引導的技巧叫做？',
    opts:['亂槍打鳥','定向刺激提示 (Directional Stimulus)','格式限制','翻譯模式'], ans:1,
    explain:'Directional Stimulus（定向刺激提示）透過指定語氣、風格或方向，引導 AI 產出符合特定場景的內容。' },
  { id:16, cat:'prompt', q:'近年流行的 LCNC (低程式碼/無程式碼) 平台，主打的最大好處是什麼？',
    opts:['電腦不用插電','不用寫一堆複雜的程式碼，用滑鼠點一點就能做 AI 系統','完全免費不用錢','不需要網路就能上網'], ans:1,
    explain:'LCNC（Low-Code/No-Code）平台讓非工程師也能透過視覺化介面搭建 AI 應用，大幅降低技術門檻。' },

const CAT_LABELS = { ai:'AI 概念', prompt:'Prompt Engineering', data:'資料與 AI 技術', carbon:'碳盤查與碳排放', tcfd:'TCFD / CBAM', iso:'ISO 盤查 / 查驗' };
const CAT_CLASSES = { ai:'tag-ai', prompt:'tag-prompt', data:'tag-data', carbon:'tag-carbon', tcfd:'tag-tcfd', iso:'tag-iso' };

let state = {
  currentCat: 'all',
  queue: [],
  idx: 0,
  answered: {}, // id -> {selected, correct}
  wrong: new Set(),
  unseen: new Set(ALL_QUESTIONS.map(q=>q.id)),
  stats: { correct: 0, streak: 0, total: 0 }
};

function shuffle(arr) { return [...arr].sort(() => Math.random() - 0.5); }

function getPool() {
  let base = state.currentCat === 'all' ? ALL_QUESTIONS : ALL_QUESTIONS.filter(q => q.cat === state.currentCat);
  const mode = document.getElementById('mode-select').value;
  if (mode === 'wrong') base = base.filter(q => state.wrong.has(q.id));
  if (mode === 'unseen') base = base.filter(q => state.unseen.has(q.id));
  return base;
}

function startQuiz() {
  const pool = getPool();
  if (!pool.length) { alert('沒有符合條件的題目！請切換模式或分類。'); return; }
  state.queue = shuffle(pool);
  state.idx = 0;
  document.getElementById('quiz-screen').style.display = 'block';
  document.getElementById('result-screen').style.display = 'none';
  renderQ();
}

function filterCat(cat) {
  state.currentCat = cat;
  document.querySelectorAll('.sidebar-btn[data-cat]').forEach(b => b.classList.toggle('active', b.dataset.cat === cat));
  startQuiz();
}

function renderQ() {
  if (state.idx >= state.queue.length) { showResult(); return; }
  const q = state.queue[state.idx];
  const shuffledOpts = q.opts.map((o, i) => ({ text: o, origIdx: i })).sort(() => Math.random() - 0.5);

  document.getElementById('q-num').textContent = `題目 ${state.idx + 1}`;
  document.getElementById('q-progress').textContent = `${state.idx + 1} / ${state.queue.length}`;
  document.getElementById('q-text').textContent = q.q;

  const tag = document.getElementById('q-tag');
  tag.textContent = CAT_LABELS[q.cat];
  tag.className = 'q-tag ' + CAT_CLASSES[q.cat];

  const bar = document.getElementById('progress-bar');
  bar.style.width = ((state.idx / state.queue.length) * 100) + '%';

  const opts = document.getElementById('options');
  opts.innerHTML = '';
  const letters = ['A','B','C','D'];
  shuffledOpts.forEach((o, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn';
    btn.innerHTML = `<span class="option-letter">${letters[i]}</span><span>${o.text}</span>`;
    btn.onclick = () => selectAnswer(o.origIdx, shuffledOpts, q);
    opts.appendChild(btn);
  });

  const fb = document.getElementById('feedback');
  fb.style.display = 'none';
  fb.className = 'feedback';

  document.getElementById('next-btn').style.display = 'none';
  document.getElementById('prev-btn').disabled = state.idx === 0;
  document.getElementById('skip-btn').style.display = 'inline';
}

function selectAnswer(selectedOrig, shuffledOpts, q) {
  const isCorrect = selectedOrig === q.ans;
  const optBtns = document.querySelectorAll('.option-btn');

  shuffledOpts.forEach((o, i) => {
    optBtns[i].disabled = true;
    if (o.origIdx === q.ans) optBtns[i].classList.add('correct');
    else if (o.origIdx === selectedOrig && !isCorrect) optBtns[i].classList.add('wrong');
    else optBtns[i].classList.add('reveal');
  });

  // stats
  if (!state.answered[q.id]) {
    state.stats.total++;
    if (isCorrect) {
      state.stats.correct++;
      state.stats.streak++;
      state.wrong.delete(q.id);
    } else {
      state.stats.streak = 0;
      state.wrong.add(q.id);
    }
    state.unseen.delete(q.id);
    state.answered[q.id] = { selected: selectedOrig, correct: isCorrect };
    updateStats();
  }

  const fb = document.getElementById('feedback');
  fb.style.display = 'block';
  if (isCorrect) {
    fb.className = 'feedback correct';
    document.getElementById('fb-title').textContent = '✓ 答對了！';
  } else {
    fb.className = 'feedback wrong';
    document.getElementById('fb-title').textContent = '✗ 答錯了';
  }
  document.getElementById('fb-body').textContent = q.explain;

  document.getElementById('next-btn').style.display = 'inline-flex';
  document.getElementById('skip-btn').style.display = 'none';
}

function goNext() {
  state.idx++;
  renderQ();
}

function goPrev() {
  if (state.idx > 0) { state.idx--; renderQ(); }
}

function skipQ() {
  state.idx++;
  if (state.idx >= state.queue.length) { showResult(); return; }
  renderQ();
}

function updateStats() {
  document.getElementById('stat-correct').textContent = state.stats.correct;
  document.getElementById('stat-streak').textContent = state.stats.streak;
  document.getElementById('stat-total').textContent = state.stats.total;
}

function showResult() {
  document.getElementById('quiz-screen').style.display = 'none';
  const rs = document.getElementById('result-screen');
  rs.style.display = 'flex';
  const total = state.queue.length;
  const correct = state.queue.filter(q => state.answered[q.id]?.correct).length;
  const pct = Math.round((correct / total) * 100);
  document.getElementById('res-score').textContent = pct + '%';
  const titles = [[80,'🏆 太強了！','繼續保持這個狀態'],[60,'👍 不錯！','再衝一輪鞏固記憶'],[0,'💪 繼續加油！','錯的題目再刷一次就會了']];
  const [,t,s] = titles.find(([min]) => pct >= min);
  document.getElementById('res-title').textContent = t;
  document.getElementById('res-sub').textContent = `答對 ${correct} / ${total} 題 · ${s}`;
}

function reviewWrong() {
  document.getElementById('mode-select').value = 'wrong';
  startQuiz();
}

// init sidebar counts
function initCounts() {
  document.getElementById('cnt-all').textContent = ALL_QUESTIONS.length;
  ['ai','prompt','data','carbon','tcfd','iso'].forEach(cat => {
    const el = document.getElementById('cnt-' + cat);
    if (el) el.textContent = ALL_QUESTIONS.filter(q => q.cat === cat).length;
  });
}

initCounts();
startQuiz();
</script>
</body>
</html>
